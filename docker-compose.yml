services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SMART_CROP_DB=/app/data/smart_crop.db
    volumes:
      - smart_crop_data:/app/data
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
volumes:
  smart_crop_data:
